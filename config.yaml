# yaml-language-server: $schema=config.schema.json

# -----------------------------------------------------------
# 🏛️ Organization Info
# -----------------------------------------------------------
org:
  name: Bude Global Enterprise
  description: Bude Global Enterprise is a technology company focused on building high-impact enterprise solutions and fostering community-driven open-source projects.
  url: https://www.budeglobal.in/
  logo_url: https://www.budeglobal.in/images/optimized/budeglobal_logo-336w.webp
  start_date: 2024-01-01
  socials:
    github: https://github.com/BUDEGlobalEnterprise
    email: budeglobalerp@gmail.com

# -----------------------------------------------------------
# 🌐 Site and SEO Metadata
# -----------------------------------------------------------
meta:
  title: Leaderboard - BUDE Global Enterprise
  description: BUDE Global Enterprise Leaderboard tracks weekly open-source contributions across the BUDE Global Enterprise organization.
  image_url: https://avatars.githubusercontent.com/u/42944450?s=280&v=4
  site_url: http://localhost:3000
  favicon_url: https://www.budeglobal.in/images/optimized/budeglobal_logo-336w.webp

# -----------------------------------------------------------
# 🏆 Leaderboard related configurations
# -----------------------------------------------------------
leaderboard:
  # This can later be replaced by your own data source or GitHub scraper
  data_source: https://github.com/BUDEGlobalEnterprise/community-dashboard


  # --- Roles shown in leaderboard (keep structure exact) ---
  roles:
    core:
      name: Core
      description: Core member of Bude Global Enterprise
    mentor:
      name: Mentor
      description: Bude Global Enterprise mentor or maintainer
    contributor:
      name: Contributor
      description: Open source contributor to Bude Global Enterprise
    participant:
      name: Participant
      description: Participant in community or events
    bot:
      name: Bot
      description: Automated system account
      hidden: true

  # --- Sidebar top contributors sections ---
  top_contributors:
    - pr_merged
    - pr_opened
    - issue_opened
    - issue_assigned

  # --- Social profile icons mapping ---
  social_profiles:
    github:
      icon: github
    linkedin:
      icon: linkedin
    twitter:
      icon: twitter
    email:
      icon: mail

# -----------------------------------------------------------
# ⚙️ Scraper configuration (optional for now)
# -----------------------------------------------------------
scraper:
  schedule: 0 */12 * * *
  scrapers:
    - name: GitHub Scraper
      repository: BUDEGlobalEnterprise/community-dashboard
      envs:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_ORG: ${{ github.repository_owner }}
